AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Gaming tournaments MVP backend

Globals:
  Function:
    Runtime: python3.12
    Timeout: 15
    MemorySize: 256
    Tracing: Active
    Environment:
      Variables:
        APP_TABLE_NAME: !Ref GamingAppTable

Resources:
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - OPTIONS

  CreateProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: handlers.create_profile.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GamingAppTable
      Events:
        CreateProfile:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /profiles
            Method: POST

  CreateTournamentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: handlers.create_tournament.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GamingAppTable
      Events:
        CreateTournament:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /tournaments
            Method: POST

  JoinTournamentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: handlers.join_tournament.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GamingAppTable
      Events:
        JoinTournament:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /tournaments/{tournament_id}/join
            Method: POST

  SubmitScoreFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: handlers.submit_score.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GamingAppTable
      Events:
        SubmitScore:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /matches/{match_id}/score
            Method: POST

  GetLeaderboardFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: handlers.get_leaderboard.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref GamingAppTable
      Events:
        GetLeaderboard:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /leaderboards
            Method: GET

  GamingAppTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true

Outputs:
  ApiUrl:
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  TableName:
    Value: !Ref GamingAppTable
